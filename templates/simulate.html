{% extends "base.html" %}

{% block content %}
<style>
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .section-title { grid-column: 1 / -1; margin-top: 20px; margin-bottom: 5px; border-bottom: 2px solid #ecf0f1; padding-bottom: 5px; color: #2980b9; }
    /* A lovely red box for our error messages */
    #error-box { display: none; background-color: #f8d7da; color: #721c24; padding: 15px; border-radius: 6px; border-left: 5px solid #f5c6cb; margin-bottom: 20px; font-weight: bold; }
</style>

<div class="card">
    <h2>Direct Spectrum Simulation</h2>
    <p class="subtitle">Calculate the transmission spectrum from known physical dimensions.</p>
    
    <div id="error-box"></div>

    <div class="form-grid">
        <h3 class="section-title">Frequency Range</h3>
        <div class="form-group"><label>Start Freq [THz]:</label><input type="number" id="sim-fstart" placeholder="e.g., 1.0" step="0.1"></div>
        <div class="form-group"><label>Stop Freq [THz]:</label><input type="number" id="sim-fstop" placeholder="e.g., 4.0" step="0.1"></div>
        <div class="form-group"><label>Number of Points:</label><input type="number" id="sim-fpoints" placeholder="e.g., 1000 (Max 10000)" step="100"></div>
        <div></div>

        <h3 class="section-title">Physical Parameters</h3>
        <div class="form-group"><label>Metal Length L_m [m]:</label><input type="number" id="sim-Lm" placeholder="e.g., 12.93e-6"></div>
        <div class="form-group"><label>Etch Length L_e [m]:</label><input type="number" id="sim-Le" placeholder="e.g., 3.11e-6"></div>
        <div class="form-group"><label>Metal Refractive Index n_mm:</label><input type="number" id="sim-nmm" placeholder="e.g., 3.67" step="0.01"></div>
        <div class="form-group"><label>Etch Refractive Index n_ee:</label><input type="number" id="sim-nee" placeholder="e.g., 3.07" step="0.01"></div>
        <div class="form-group"><label>Metal Absorption a_m [m^-1]:</label><input type="number" id="sim-am" placeholder="e.g., 750"></div>
        <div class="form-group"><label>Etch Absorption a_e [m^-1]:</label><input type="number" id="sim-ae" placeholder="e.g., 3812"></div>
        <div class="form-group"><label>Bragg Periods N (Even Integer):</label><input type="number" id="sim-N" placeholder="e.g., 14" step="2"></div>
        <div class="form-group"><label>Chip Length L_c [m]:</label><input type="number" id="sim-Lc" placeholder="e.g., 2e-3"></div>

        <h3 class="section-title">Phase Shift</h3>
        <div class="form-group" style="grid-column: 1 / -1;">
            <label style="display: inline-flex; align-items: center; cursor: pointer;">
                <input type="checkbox" id="sim-pishift" onchange="togglePiShift()" style="width: 20px; height: 20px; margin-right: 10px;">
                Enable Central Pi-Shift
            </label>
        </div>
        
        <div id="pi-params" class="form-grid" style="grid-column: 1 / -1; margin: 0; display: none;">
            <div class="form-group"><label>Pi-Shift Length L_pi [m]:</label><input type="number" id="sim-Lpi" placeholder="e.g., 6.22e-6"></div>
            <div class="form-group"><label>Deviation Delta [m]:</label><input type="number" id="sim-delta" placeholder="e.g., 0.0"></div>
        </div>
    </div>

    <button onclick="runSimulation()" id="run-btn">Run Simulation</button>
</div>

<div class="card" id="chart-card" style="display: none; margin-top: 30px;">
    <canvas id="simChart"></canvas>
</div>

<script>
    let currentChart = null;

    function togglePiShift() {
        const isTicked = document.getElementById('sim-pishift').checked;
        document.getElementById('pi-params').style.display = isTicked ? 'grid' : 'none';
    }
    
    // The Ultimate Validation Gatekeeper!
    async function runSimulation() {
        const errorBox = document.getElementById('error-box');
        const runBtn = document.getElementById('run-btn');
        const chartCard = document.getElementById('chart-card');
        errorBox.style.display = 'none'; // Hide old errors
        
        // 1. Grab the values
        const fstart = parseFloat(document.getElementById('sim-fstart').value);
        const fstop = parseFloat(document.getElementById('sim-fstop').value);
        const fpoints = parseInt(document.getElementById('sim-fpoints').value);
        const Lm = parseFloat(document.getElementById('sim-Lm').value);
        const Le = parseFloat(document.getElementById('sim-Le').value);
        const nmm = parseFloat(document.getElementById('sim-nmm').value);
        const nee = parseFloat(document.getElementById('sim-nee').value);
        const am = parseFloat(document.getElementById('sim-am').value);
        const ae = parseFloat(document.getElementById('sim-ae').value);
        const N = parseFloat(document.getElementById('sim-N').value);
        const Lc = parseFloat(document.getElementById('sim-Lc').value);
        

        if ([fstart, fstop, fpoints, Lm, Le, nmm, nee, am, ae, N, Lc].some(isNaN)) {
            showError("Validation Error: All base physical parameters must be specified."); return;
        }

        // Frequency Logic Checks
        if (fstart <= 0 || fstop <= 0) {
            showError("Frequencies must be greater than zero.");
            return;
        }
        if (fstart >= fstop) {
            showError("Your Start Frequency must be lower than your Stop Frequency!");
            return;
        }
        if (fpoints <= 0 || fpoints > 10000) {
            showError("Number of points must be between 1 and 10,000 to save our poor server!");
            return;
        }
        if (!Number.isInteger(N) || N <= 0 || N % 2 !== 0) {
            showError("The number of Bragg periods (N) must be a positive, EVEN whole number!");
            return;
        }
        if (Lm <= 0 || Le <= 0) {
            showError("Lengths cannot be zero or negative.");
            return;
        }
        const isTicked = document.getElementById('sim-pishift').checked;
        let Lpi = 0.0;
        let delta = 0.0;

        if (isTicked) {
            Lpi = parseFloat(document.getElementById('sim-Lpi').value);
            delta = parseFloat(document.getElementById('sim-delta').value);
            if (isNaN(Lpi) || isNaN(delta)) { showError("Validation Error: Phase-shift parameters missing."); return; }
        }


        runBtn.disabled = true;
        runBtn.innerHTML = "Calculating... Please Wait";
        runBtn.style.backgroundColor = "#95a5a6"; // Turn it grey

        const payload = {
            f_start: fstart * 1e12, // Convert THz to Hz for the backend
            f_stop: fstop * 1e12,
            points: fpoints,
            Lm: Lm, Le: Le, nmm: nmm, nee: nee, am: am, ae: ae, 
            N: N, Lc: Lc, pishift: isTicked, Lpi: Lpi, delta: delta
        };
        try {
            // 4. Send the data to your Python Flask server
            const response = await fetch('/api/simulate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                // 5. Success! Draw the beautiful chart
                drawChart(data.frequencies, data.transmission);
            } else {
                showError("Server Error: " + data.message);
            }
        } catch (error) {
            showError("Connection Failed: Ensure the Flask server is running, darling.");
        } finally {
            // 6. Unlock the UI when finished (success or fail)
            runBtn.disabled = false;
            runBtn.innerHTML = "Run Simulation";
            runBtn.style.backgroundColor = "#3498db";
        }
    }

    function drawChart(x_data, y_data) {
        const chartCard = document.getElementById('chart-card');
        chartCard.style.display = 'block'; // Show the card!

        const ctx = document.getElementById('simChart').getContext('2d');
        
        // Destroy the old chart if they hit "Run" a second time
        if (currentChart) { currentChart.destroy(); }

        currentChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: x_data, // The frequency points (in THz)
                datasets: [{
                    label: 'Transmission Spectrum',
                    data: y_data, // The power transmission array
                    borderColor: '#2980b9',
                    borderWidth: 2,
                    pointRadius: 0, // Hide the dots, just show a smooth line!
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                interaction: { intersect: false, mode: 'index' },
                scales: {
                    x: { title: { display: true, text: 'Frequency (THz)', font: {size: 14, weight: 'bold'} } },
                    y: { title: { display: true, text: 'Transmission [a.u.]', font: {size: 14, weight: 'bold'} }, beginAtZero: true }
                }
            }
        });

        chartCard.scrollIntoView({ behavior: 'smooth' });
    }

    function showError(message) {
        const errorBox = document.getElementById('error-box');
        errorBox.innerHTML = message;
        errorBox.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.onload = togglePiShift;
</script>
{% endblock %}
